<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function(){
        var p = window.location.search.slice(1).split('&').filter(function(s){return s.startsWith('p=')});
        if (p.length) {
          var path = p[0].slice(2).replace(/~and~/g,'&');
          var rest = window.location.search.slice(1).split('&').filter(function(s){return !s.startsWith('p=')&&!s.startsWith('q=')});
          var qs = window.location.search.slice(1).split('&').filter(function(s){return s.startsWith('q=')});
          window.history.replaceState(null,null,
            '/Avitaz/'+path+(rest.length?'?'+rest.join('&'):'')+(qs.length?'?'+decodeURIComponent(qs[0].slice(2)):'')+window.location.hash
          );
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AvitaZ" />
    <meta name="theme-color" content="#0f172a" />
    <title>아비타즈</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
